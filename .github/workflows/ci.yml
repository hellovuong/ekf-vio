name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────
  # Build & test via the multi-stage Dockerfile
  #
  # deps → build → test
  #
  # The Dockerfile is the single source of truth for
  # dependencies, compilation, and test execution.
  # ────────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the 'test' target and name it 'reporter' so we can access it
      - name: Build and test (Docker)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          load: true  # This loads the image into the local docker registry
          tags: ekf-vio:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Copy the coverage file out of the finished container
      - name: Extract coverage report
        run: |
          docker create --name extract ekf-vio:test
          docker cp extract:/ws/coverage.info ./coverage.info
          docker rm extract

      # Upload to Codecov (Recommended for nice PR comments)
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }} # Get this from codecov.io

  # ────────────────────────────────────────────────────────────
  # Lint: run all pre-commit hooks
  # ────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1
