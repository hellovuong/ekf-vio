# ============================================================
# EKF-VIO parameters for EuRoC MAV dataset
# (Machine Hall sequences: MH_01 – MH_05)
# ============================================================

/**:
  ros__parameters:

    # ── Camera (left, after rectification) ───────────────────
    camera:
      fx: 458.654
      fy: 457.296
      cx: 367.215
      cy: 248.375
      baseline: 0.11007  # metres

    # ── IMU-to-left-camera extrinsic  T_{cam←imu} ───────────
    # Rotation + translation: row-major 4×4 homogeneous matrix
    # Values from EuRoC calibration file
    T_cam_imu:
      - [ 0.0148655429818, -0.999880929698,  0.00414029679422, -0.0216401454975]
      - [ 0.999557249008,   0.0149672133247,  0.025715529948,  -0.064676986768 ]
      - [-0.0257744366974,  0.00375618835797, 0.999660727178,   0.00981073058949]
      - [ 0.0,              0.0,              0.0,              1.0             ]

    # ── IMU noise parameters (Allan variance-derived) ────────
    noise:
      sigma_gyro:        1.6968e-4   # rad/s/√Hz
      sigma_accel:       2.0000e-3   # m/s²/√Hz
      sigma_gyro_bias:   1.9393e-5   # rad/s²/√Hz
      sigma_accel_bias:  3.0000e-5   # m/s³/√Hz
      sigma_pixel:       1.5         # pixels

    # ── Feature Tracker ──────────────────────────────────────
    tracker:
      max_features:       300
      fast_threshold:     20
      lk_win_size:        21
      lk_max_level:       3
      min_disparity:      1.0
      max_disparity:      200.0
      ransac_thresh_px:   1.5
