# ============================================================
# EKF-VIO configuration for EuRoC MAV dataset
# ============================================================

# ── Stereo Camera ─────────────────────────────────────────────
camera:
  image_width:  752
  image_height: 480

  # cam0 (left) intrinsics & distortion (radtan)
  cam0:
    fx: 458.654
    fy: 457.296
    cx: 367.215
    cy: 248.375
    distortion: [-0.28340811, 0.07395907, 0.00019359, 1.76187114e-05]

  # cam1 (right) intrinsics & distortion (radtan)
  cam1:
    fx: 457.587
    fy: 456.134
    cx: 379.999
    cy: 255.238
    distortion: [-0.28368365, 0.07451284, -0.00010473, -3.55590700e-05]

  # T_BS = sensor→body (EuRoC convention), row-major 4×4
  T_BS0: [ 0.0148655429818, -0.999880929698,  0.00414029679422, -0.0216401454975,
           0.999557249008,   0.0149672133247,  0.025715529948,   -0.064676986768,
          -0.0257744366974,  0.00375618835797, 0.999660727178,    0.00981073058949,
           0.0,              0.0,              0.0,               1.0 ]

  T_BS1: [ 0.0125552670891, -0.999755099723,  0.0182237714554,  -0.0198435579556,
           0.999598781151,   0.0130119051815,  0.0251588363115,   0.0453689425024,
          -0.0253898008918,  0.0179005838253,  0.999517347078,    0.00786212447038,
           0.0,              0.0,              0.0,               1.0 ]

# ── IMU noise (Allan variance / datasheet, matches ORB-SLAM3) ──
imu:
  noise_gyro:  1.7e-4       # rad/s/√Hz  (ORB-SLAM3: 1.7e-4)
  noise_accel: 2.0e-3       # m/s²/√Hz
  gyro_walk:   1.9393e-5    # rad/s²/√Hz
  accel_walk:  3.0e-3       # m/s³/√Hz
  frequency:   200.0        # Hz

# ── EKF tuning ────────────────────────────────────────────────
ekf:
  sigma_pixel:          1.5     # reprojection noise (pixels)
  vo_position_noise:    0.10    # VO pose update σ_p (metres)  [unused after Phase 1]
  vo_orientation_noise: 0.03    # VO pose update σ_q (radians) [unused after Phase 1]
  landmark_max_age:     5       # keep landmarks N frames after last observation

# ── Feature Tracker ───────────────────────────────────────────
tracker:
  max_features:      300
  fast_threshold:    20
  lk_win_size:       21
  lk_max_level:      3
  min_disparity:        1.0   # pixels
  max_disparity:      200.0   # pixels
  stereo_search_radius: 40   # ZNCC 1-D search half-width around left x (px); raise for close objects
  ransac_thresh_px:     1.0   # E-matrix RANSAC inlier threshold (px)
  epipolar_thresh_px: 3.0   # max vertical disparity for rectified stereo (px)

# ── Visual Odometry ───────────────────────────────────────────
vo:
  min_pnp_points:    8
  pnp_reproj_thresh: 3.0     # pixels
  kf_tracked_ratio:  0.60
  kf_min_tracked:    80
  max_translation_m: 1.0     # reject motion jump > this (m)
  max_rotation_deg:  20.0    # reject motion jump > this (deg)

# ── Initial Covariance (diagonal blocks) ──────────────────────
initial_covariance:
  position:    1.0e-2    # ~10 cm
  velocity:    1.0e-2    # ~0.1 m/s
  orientation: 1.0e-3    # ~1.8 deg
  gyro_bias:   1.0e-4
  accel_bias:  1.0e-2
